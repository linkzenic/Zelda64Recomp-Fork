name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: Android Gradle build type
        required: true
        default: release
        type: choice
        options:
          - release
          - debug
      release_tag:
        description: Optional release tag to publish
        required: false
        type: string
      release_title:
        description: Optional release title
        required: false
        type: string
      release_notes:
        description: Optional release notes
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android-apk:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set Android build paths
        shell: bash
        run: |
          set -euo pipefail
          echo "ANDROID_PREFIX_ROOT=${GITHUB_WORKSPACE}/.android-prefixes" >> "$GITHUB_ENV"
          echo "ZELDA_ANDROID_FILE_TO_C=${RUNNER_TEMP}/zelda64-file-to-c" >> "$GITHUB_ENV"
          echo "ZELDA_ANDROID_SDL2_PREFIX=${GITHUB_WORKSPACE}/.android-prefixes/SDL2-2.32.10-android-arm64" >> "$GITHUB_ENV"
          echo "ZELDA_ANDROID_FREETYPE_PREFIX=${GITHUB_WORKSPACE}/.android-prefixes/freetype-2.13.3-android-arm64" >> "$GITHUB_ENV"

      - name: Restore generated runtime sources
        shell: bash
        env:
          ZELDA_ANDROID_GENERATED_SOURCES_URL: ${{ secrets.ZELDA_ANDROID_GENERATED_SOURCES_URL }}
          ZELDA_ANDROID_GENERATED_SOURCES_TOKEN: ${{ secrets.ZELDA_ANDROID_GENERATED_SOURCES_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${ZELDA_ANDROID_GENERATED_SOURCES_URL:-}" ]]; then
            echo "No generated source bundle URL configured; checking the repository contents only."
            exit 0
          fi

          bundle_path="${RUNNER_TEMP}/zelda64-generated-sources.zip"
          curl_args=(-fsSL --retry 3 --retry-delay 5)
          if [[ -n "${ZELDA_ANDROID_GENERATED_SOURCES_TOKEN:-}" ]]; then
            curl_args+=(-H "Authorization: Bearer ${ZELDA_ANDROID_GENERATED_SOURCES_TOKEN}")
            curl_args+=(-H "Accept: application/octet-stream")
          fi

          curl "${curl_args[@]}" -o "$bundle_path" "$ZELDA_ANDROID_GENERATED_SOURCES_URL"
          python3 - "$bundle_path" <<'PY'
          import pathlib
          import sys
          import zipfile

          bundle = pathlib.Path(sys.argv[1])
          root = pathlib.Path.cwd().resolve()
          allowed_roots = {
              "RecompiledFuncs",
              "RecompiledPatches",
              "rsp",
          }

          with zipfile.ZipFile(bundle) as archive:
              for info in archive.infolist():
                  name = pathlib.PurePosixPath(info.filename)
                  if info.is_dir():
                      continue
                  if name.is_absolute() or ".." in name.parts:
                      raise SystemExit(f"Refusing unsafe archive path: {info.filename}")
                  if not name.parts or name.parts[0] not in allowed_roots:
                      raise SystemExit(f"Unexpected archive path: {info.filename}")

              archive.extractall(root)
          PY

      - name: Check generated runtime sources
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          compgen -G 'RecompiledFuncs/*.c' >/dev/null || missing+=('RecompiledFuncs/*.c')
          [[ -f rsp/aspMain.cpp ]] || missing+=('rsp/aspMain.cpp')
          [[ -f rsp/njpgdspMain.cpp ]] || missing+=('rsp/njpgdspMain.cpp')
          [[ -f RecompiledPatches/patches.c ]] || missing+=('RecompiledPatches/patches.c')
          [[ -f RecompiledPatches/patches_bin.c ]] || missing+=('RecompiledPatches/patches_bin.c')

          if (( ${#missing[@]} )); then
            {
              echo '## Android APK build cannot start'
              echo
              echo 'The generated Zelda64 runtime sources are missing from this checkout.'
              echo 'Generate them locally first with:'
              echo
              echo '```sh'
              echo 'tools/ci/prepare_android_generated_sources.sh'
              echo '```'
              echo
              echo 'Missing files/patterns:'
              for item in "${missing[@]}"; do
                echo "- \`${item}\`"
              done
              echo
              echo 'Do not commit ROM files. The workflow can only build the APK once the generated source inputs are available to the runner.'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Install host tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y clang lld ninja-build zip unzip xz-utils
          echo "PATCHES_C_COMPILER=$(command -v clang)" >> "$GITHUB_ENV"
          echo "PATCHES_LD=$(command -v ld.lld)" >> "$GITHUB_ENV"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.1'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        shell: bash
        run: |
          set -euo pipefail
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          sdkmanager_status="${PIPESTATUS[1]}"
          set -o pipefail
          if [[ "$sdkmanager_status" -ne 0 ]]; then
            exit "$sdkmanager_status"
          fi
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;35.0.0" \
            "cmake;3.30.3" \
            "ndk;28.2.13676358"
          echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/28.2.13676358" >> "$GITHUB_ENV"

      - name: Cache Android native dependency prefixes
        uses: actions/cache@v4
        with:
          path: .android-prefixes
          key: android-prefixes-${{ runner.os }}-sdl2-2.32.10-freetype-2.13.3-ndk-28.2.13676358-16kb-v1

      - name: Prepare Android dependencies
        run: tools/ci/setup_android_deps.sh

      - name: Prepare generated source helpers
        run: tools/ci/prepare_android_generated_sources.sh

      - name: Build host file_to_c helper
        shell: bash
        run: |
          set -euo pipefail
          c++ -std=c++17 -O2 lib/rt64/src/tools/file_to_c/file_to_c.cpp -o "$ZELDA_ANDROID_FILE_TO_C"

      - name: Prepare release signing
        if: inputs.build_type == 'release'
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [[ -z "${ANDROID_KEYSTORE_BASE64:-}" ]]; then
            exit 0
          fi
          keystore_path="${RUNNER_TEMP}/android-release-keystore.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          echo "ANDROID_KEYSTORE_PATH=$keystore_path" >> "$GITHUB_ENV"

      - name: Build APK
        shell: bash
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ '${{ inputs.build_type }}' == 'release' && -z "${ANDROID_KEYSTORE_PATH:-}" ]]; then
            echo 'Release signing secrets are not configured. This workflow builds release APKs for real testing, so add ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, and ANDROID_KEY_PASSWORD.' >&2
            exit 1
          fi
          task=':app:assembleDebug'
          if [[ '${{ inputs.build_type }}' == 'release' ]]; then
            task=':app:assembleRelease'
          fi
          gradle --no-daemon -p android "$task" -PzeldaProbe=false

      - name: Locate APK
        id: apk
        shell: bash
        run: |
          set -euo pipefail
          apk="$(find android/app/build/outputs/apk/${{ inputs.build_type }} -name '*.apk' | head -n 1)"
          if [[ -z "$apk" ]]; then
            echo "No APK found" >&2
            exit 1
          fi
          echo "path=$apk" >> "$GITHUB_OUTPUT"

      - name: Verify APK
        run: tools/ci/verify_android_apk.sh "${{ steps.apk.outputs.path }}" runtime

      - name: Upload native symbols
        uses: actions/upload-artifact@v4
        with:
          name: Zelda64-Recompiled-Android-${{ inputs.build_type }}-native-symbols
          path: |
            android/app/build/intermediates/cxx/**/obj/arm64-v8a/*.so
            android/app/build/intermediates/merged_native_libs/**/out/lib/arm64-v8a/*.so
          if-no-files-found: warn

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Zelda64-Recompiled-Android-${{ inputs.build_type }}
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error

      - name: Publish release
        if: inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          release_title="${{ inputs.release_title }}"
          if [[ -z "$release_title" ]]; then
            release_title="${{ inputs.release_tag }}"
          fi
          release_notes="${{ inputs.release_notes }}"
          if [[ -z "$release_notes" ]]; then
            release_notes="Android"
          fi
          asset_suffix="${{ inputs.release_tag }}"
          asset_suffix="${asset_suffix#android-}"
          asset_name="Zelda64-Recompiled-Android-${asset_suffix}.apk"
          cp "${{ steps.apk.outputs.path }}" "$asset_name"
          gh release create "${{ inputs.release_tag }}" "$asset_name" \
            --target "${{ github.sha }}" \
            --title "$release_title" \
            --notes "$release_notes"
