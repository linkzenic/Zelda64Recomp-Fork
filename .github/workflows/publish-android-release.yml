name: Publish Android Release

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: Successful Android APK workflow run id
        required: true
        type: string
      tag:
        description: Release tag
        required: true
        type: string
      title:
        description: Release title
        required: true
        type: string
      notes:
        description: Release notes
        required: true
        type: string
      target:
        description: Release target commit
        required: true
        type: string

permissions:
  actions: read
  contents: write

jobs:
  publish:
    name: Publish Android release
    runs-on: ubuntu-latest
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ inputs.run_id }}
          name: Zelda64-Recompiled-Android-release
          path: dist

      - name: Prepare asset
        shell: bash
        run: |
          set -euo pipefail
          apk="$(find dist -name '*.apk' | head -n 1)"
          if [[ -z "$apk" ]]; then
            echo "No APK found in artifact" >&2
            exit 1
          fi
          cp "$apk" "Zelda64-Recompiled-Android-${{ inputs.tag }}.apk"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ inputs.tag }}" \
            "Zelda64-Recompiled-Android-${{ inputs.tag }}.apk" \
            --target "${{ inputs.target }}" \
            --title "${{ inputs.title }}" \
            --notes "${{ inputs.notes }}"
